<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Student Hub | Dashboard </title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="style.css">
        <script>
            tailwind.config={
                theme:{
                    extend: {colors: {primary: '#77032d', secondary: '#e99db6', accent: '#ca767e'}}
                }
            }
        </script>

    </head>

    <body class="bg-pink-50 text-primary">
        <nav class="bg-primary text-white p-6 flex flex-col md:flex-row justify-between items-center shadow-lg">
            <h1 class="text-2xl font-bold">Student Hub</h1>
            <ul class="flex gap-6 mt-4 md:mt-0">
                <li><a href="#" class="hover:text-secondary">Home</a></li>
                <li><a href="#" class="hover:text-secondary">Dashboard</a></li>
                <li><a href="#" class="hover:text-secondary">About</a></li>
                <li><a href="#" class="hover:text-secondary">Contact</a></li>
            </ul>

        </nav>

        <header class=""text-center py-16 bg-secondary">
        <h1 class=text-4xl font-bold text-primary">Your Academic Command Centre</h1>

        <p class="mt-2">Manage your academic life, one day at a time.</p>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-2 gap-8 p-8 max-w-6xl mx-auto">
        <section id="task-manager" class="bg-white p-6 rounded-2xl shadow-md border-2 border-secondary">
            <h2 class="text-2xl font-bold mb-4">Task Manager</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="task-input" placeholder="Add a new task" class="border border-secondary p-2 flex-grow rounded-lg">
                <button id="addBtn" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-accent transition">Add</button>
            </div>
            <ul id=""taskList" class=""space-y-2"></ul>
        </section>

        <section id="notes-section" class="bg-white p-6 rounded-2xl shadow-md border-2 border-secondary">
            <h2 class="text-2xl font-bold mb-4">Quick Notes</h2>
            <div id="notesContainer" class="grid gap-4 mb-4"></div>
            <button id="addNoteBtn" class="bg-primary text-white w-full py-2 rounded-lg hover:bg-accent transition">Add New Note</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
